<head>

  <meta http-equiv="content-type" content="text/html; charset=utf-8">

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

  <title>
    {% if page.title %}
      {{ page.title }}
    {% elsif page.content | strip_html | strip_newlines | size > 0 %}
      {% assign first_content = page.content %}
      {% if first_content contains "<h1>" or first_content contains "<h2>" or first_content contains "<h3>" or first_content contains "<h4>" or first_content contains "<h5>" or first_content contains "<h6>" %}
        {% if first_content contains "<h1>" %}
          {{ first_content | split: "</h1>" | first | split: "<h1>" | last | strip_html | strip }}
        {% elsif first_content contains "<h2>" %}
          {{ first_content | split: "</h2>" | first | split: "<h2>" | last | strip_html | strip }}
        {% elsif first_content contains "<h3>" %}
          {{ first_content | split: "</h3>" | first | split: "<h3>" | last | strip_html | strip }}
        {% elsif first_content contains "<h4>" %}
          {{ first_content | split: "</h4>" | first | split: "<h4>" | last | strip_html | strip }}
        {% elsif first_content contains "<h5>" %}
          {{ first_content | split: "</h5>" | first | split: "<h5>" | last | strip_html | strip }}
        {% elsif first_content contains "<h6>" %}
          {{ first_content | split: "</h6>" | first | split: "<h6>" | last | strip_html | strip }}
        {% endif %}
      {% else %}
        {{ site.title }}
      {% endif %}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/poole.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/syntax.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/hyde.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=PT+Sans:400,400italic,700|Abril+Fatface">

  <!-- Icons -->
  <link rel="apple-touch-icon-precomposed" sizes="144x144"
    href="{{ site.baseurl }}public/apple-touch-icon-144-precomposed.png">
  <link rel="shortcut icon" href="{{ site.baseurl }}public/favicon.ico">

  <link rel="stylesheet" href="{{ '/assets/FragmentRenderer/fragments.css' }}">
  <script type="module" src="/assets/FragmentRenderer/index.KO2NwMf8.js"></script>

</head>
